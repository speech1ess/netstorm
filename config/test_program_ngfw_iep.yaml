# ═══════════════════════════════════════════════════════════
# ПРОГРАММА И МЕТОДИКА ИСПЫТАНИЙ (ПМИ)
# DUT: Next-Generation Firewall (NGFW)
# MODE: L3 Routed / Stateful Inspection
# ═══════════════════════════════════════════════════════════

program:
  description: "НТ NGFW: Матрица деградации, емкость, инфраструктурная устойчивость."
  dut:
    label: "... NGFW Appliance (L3 Inline Mode)"
    mgmt_ip: "10.207.129.21"
    datapath:
      ext_ip: "10.0.60.5"
      int_ip: "10.0.40.5"
    thresholds:        # потери пакетов (в пакетах)
      warn: 10
      fatal: 50
  
# =========================================================
# ШАБЛОНЫ
# =========================================================
_templates:
  # --- Маршруты ---
  astf_route: &ASTF_Route
    client_pool: "{{ networks.external.subnets.trex_clients }}"  # Port 0 (Outside)
    server_pool: "{{ networks.server_farm.subnets.trex_servers }}" # Port 1 (Inside/DMZ)
  stl_route: &STL_Route
    client_pool: "{{ networks.external.subnets.trex_clients }}"  # Port 0 (Outside)
    server_pool: "{{ nodes.trex_node.net.interfaces.port_1.addr }}" # Port 1 (Inside/DMZ)
  # --- Акторы ---
  trex_astf_base: &TRex_ASTF
    tool: trex
    delay: 5
    tunables:
      rampup_sec: 120
      payload_dir: "{{ paths.payloads }}/iep"                       # Папка с pcap файлами
  jmeter_base: &JMeter_Base
    tool: jmeter
    profile: baseline
    threads: 200
    override_tput: 2000
    delay: 0
    jprops:
      TARGET_HOST: "{{ nodes.victim.net.ip }}"
      RAMPUP_SEC: 120
  # --- Профили ---
  # 🟢 Сумма CPS = 1000.0. Соотношение: 0.6% UDP / 99.4% TCP (Inbound Web Perimeter | Nord-South)
  mix_perimeter: &Mix_Perimeter
    # --- UDP Трафик (Итого: 6 CPS / 0.6%) ---
    - { file: "dns_0.pcap", cps: 4.00, port: 53 }                 # Резолв
    - { file: "ntp.pcap", cps: 2.00, port: 123 }                  # Время
    # --- TCP Трафик (Итого: 994 CPS / 99.4%) ---
    - { file: "1a 2 20 tcp.stream eq 539.pcap", cps: 400.00, port: 443 }  # Основной HTTPS трафик к веб-серверам
    - { file: "4a 22 459 tcp.stream eq 804.pcap", cps: 250.00, port: 8443 } # API запросы / Толстые клиенты
    - { file: "1a 2 20 tcp.stream eq 539.pcap", cps: 150.00, port: 444 }  # Доп. веб-сервисы
    - { file: "5a 56 84 tcp.stream eq 952.pcap", cps: 100.00, port: 445 } 
    - { file: "3a 40 64 tcp.stream eq 1329.pcap", cps: 54.00, port: 80 }  # Немного чистого HTTP (редиректы)
    - { file: "0a 3 5.pcap", cps: 30.00, port: 4444}                                 # Короткие чеки / Keep-Alive
    - { file: "elephant.pcap", cps: 10.00, port: 4443 }                    # Скачивание тяжелых отчетов/файлов 
  # 🟢 Сумма CPS = 1000.0. Соотношение: 20% UDP / 80% TCP (Datacenter | West-East)
  mix_datacenter: &Mix_Datacenter
    # --- UDP Трафик (Итого: 200 CPS / 20%) ---
    - { file: "syslog_udp_for_trex.pcap", cps: 120.00 }           # Агрессивный логгинг
    - { file: "dns_0.pcap", cps: 50.00, port: 53 }                # Внутренний DNS (Service Discovery)
    - { file: "snmp2c.pcap", cps: 10.00, port: 161 }              # Мониторинг (Zabbix/Prometheus)
    - { file: "ntp.pcap", cps: 10.00, port: 123 }                 # Синхронизация времени
    - { file: "dhcp_dora_unicast.pcap", cps: 10.00, port: 67 }    # Provisioning новых ВМ и серверов
    # --- TCP Трафик (Итого: 800 CPS / 80%) ---
    - { file: "1a 2 20 tcp.stream eq 539.pcap", cps: 350.00, port: 8080 } # Микросервисы (REST/gRPC)
    - { file: "4a 22 459 tcp.stream eq 804.pcap", cps: 200.00, port: 5432 } # Базы Данных (PostgreSQL)
    - { file: "1a 2 20 tcp.stream eq 539.pcap", cps: 100.00, port: 9092 } # Очереди (Kafka/RabbitMQ)
    - { file: "5a 56 84 tcp.stream eq 952.pcap", cps: 80.00, port: 6379 } # Кеширование (Redis)
    - { file: "3a 40 64 tcp.stream eq 1329.pcap", cps: 40.00, port: 22 }  # SSH / Управление конфигурациями
    - { file: "elephant.pcap", cps: 30.00, port: 445 }                    # Тяжелые бэкапы, SMB, миграция ВМ
  # --- +20 CPS инъекция вредоноса для тестов IPS ---
  ips_payload: &Mix_Malware
    - { file: "19900325.pcap", cps: 10.00, port: 8081 }
    - { file: "19900959.pcap", cps: 10.00, port: 4445 }

# ═══════════════════════════════════════════════════════════
# 1. ПРОФИЛИ ТРАФИКА (STATEFUL PROFILES)
# ═══════════════════════════════════════════════════════════
profiles: 
  # --- TRex (ASTF Mode - L4-L7 Stateful/STL Mode L3-L4 Stateless) ---
  trex:
    # --- ASTF PCAP Profiles ---
    astf_emix_dc:
      script: "astf_pcap_emixer.py" 
      tunables: 
        <<: *ASTF_Route
        rampup_sec: 120
        pcap_list: *Mix_Datacenter
        malware_list: *Mix_Malware
    astf_emix_perim:
      script: "astf_pcap_emixer.py"  
      tunables: 
        <<: *ASTF_Route
        rampup_sec: 120
        pcap_list: *Mix_Perimeter
        malware_list: *Mix_Malware
    # --- ASTF Synthetic Profiles ---
    astf_udp_cps:
      script: "astf_hammer_udp_cps.py"  
      tunables: 
        <<: *ASTF_Route
    astf_tcp_cps:
      script: "astf_mice_tcp_cps.py"    
      tunables: 
        <<: *ASTF_Route
    astf_http_cps:
      script: "astf_http_cps.py"        
      tunables: 
        <<: *ASTF_Route
    astf_max_cc:
      script: "astf_holder_max_cc.py"   
      tunables: 
        <<: *ASTF_Route
    # --- STL Synthetic Profiles ---
    syn_flood:
      script: "stl_syn_flood.py"
      tunables: 
        <<: *STL_Route
    udp_flood_64b:
      script: "stl_udp_flood.py"
      tunables:
        <<: *STL_Route
    stl_udp_microburst:
      script: "stl_udp_microburst.py"
      tunables:
        <<: *STL_Route
    stl_udp_macroburst:
      script: "stl_udp_macroburst.py"
      tunables:
        <<: *STL_Route
  # --- JMeter (L7 jmeter/NN_*.jmx) ---
  jmeter:
    baseline:
      jmx: "00_baseline.jmx"

# ═══════════════════════════════════════════════════════════
# 2. СЦЕНАРИИ ТЕСТИРОВАНИЯ (TEST CASES)
# ═══════════════════════════════════════════════════════════
scenarios:
  # =========================================================
  # ГРУППА 1: THEORETICAL LIMITS (ТЕОРЕТИЧЕСКИЙ АППАРАТНЫЙ ПОТОЛОК)
  # RUN MODE: Series (Smart Stepper & Binary)
  # =========================================================
  group_1:
    label: "Theoretical Hardware Capacity Limits (Synthetic Profiles/Degenerate traffic)"
    SYN1_UDP_STEP:
      type: "series"
      label: "UDP CPS Capacity Smart-Stepper Search [SYN1_UDP_STEP] (5k -> 25k CPS)"
      prompt: "[INFO]: L4 Mode. Ищем аппаратный потолок создания сессий (UDP)."
      repeats: 5          
      interval: 30        
      template:
        duration: 60
        actors:
          - <<: *TRex_ASTF
            profile: astf_udp_cps
            overridemult: { start: 5, step: 5 }
      presets:
        low:
          label: "🐢 Low (Start: 5k, Step: 1k)"
          overrides:
            actors:
              astf_udp_cps: { overridemult: { start: 5, step: 1 } }
        medium:
          label: "🚶 Medium (Start: 10k, Step: 10k)"
          overrides:
            actors:
              astf_udp_cps: { overridemult: { start: 10, step: 10 } }
        high:
          label: "🏃 High (Start: 50k, Step: 25k)"
          overrides:
            actors:
              astf_udp_cps: { overridemult: { start: 50, step: 25 } }
    SYN2_TCP_STEP:
      type: "series"
      label: "TCP CPS Capacity Smart-Stepper Search [SYN2_TCP_STEP] (5k -> 25k CPS)"
      prompt: "[INFO]: L4 Mode. Ищем предел сетевого стека при TCP-рукопожатиях."
      repeats: 5          
      interval: 30        
      template:
        duration: 60
        actors:
          - <<: *TRex_ASTF
            profile: astf_tcp_cps
            overridemult: { start: 5, step: 5 }
      presets:
        low:
          label: "🐢 Low (Start: 5k, Step: 1k)"
          overrides:
            actors:
              astf_tcp_cps: { overridemult: { start: 5, step: 1 } }
        medium:
          label: "🚶 Medium (Start: 10k, Step: 10k)"
          overrides:
            actors:
              astf_tcp_cps: { overridemult: { start: 10, step: 10 } }
        high:
          label: "🏃 High (Start: 50k, Step: 25k)"
          overrides:
            actors:
              astf_tcp_cps: { overridemult: { start: 50, step: 25 } }
    SYN3_HTTP_STEP:
      type: "series"
      label: "HTTP CPS Capacity Smart-Stepper Search [SYN3_HTTP_STEP] (5k -> 25k CPS)"
      prompt: "[INFO]: App-ID Mode. Ищем предел парсинга HTTP заголовков."
      repeats: 5          
      interval: 30        
      template:
        duration: 60
        actors:
          - <<: *TRex_ASTF
            profile: astf_http_cps
            overridemult: { start: 5, step: 5 }
      presets:
        low:
          label: "🐢 Low (Start: 5k, Step: 1k)"
          overrides:
            actors:
              astf_http_cps: { overridemult: { start: 5, step: 1 } }
        medium:
          label: "🚶 Medium (Start: 10k, Step: 10k)"
          overrides:
            actors:
              astf_http_cps: { overridemult: { start: 10, step: 10 } }
        high:
          label: "🏃 High (Start: 50k, Step: 25k)"
          overrides:
            actors:
              astf_http_cps: { overridemult: { start: 50, step: 25 } }
    SYN4_TCP_BIN:
      type: "series"
      label: "TCP CPS Limit Binary Search [SYN4_TCP_BIN] (10k-200k CPS)"
      prompt: "[INFO]: L4 Mode. Автоматический поиск потолка TCP CPS."
      health_check: true
      duration: 60       
      interval: 30       
      series:
        type: "binary_search"
        min: 10          
        max: 200         
        precision: 5     
      actors:
        - tool: "trex"
          profile: "astf_tcp_cps"  
      presets:
        limit_100k:
          label: "🏢 Enterprise (Max 100k CPS)"
          overrides: { series: { type: "binary_search", min: 1, max: 100, precision: 2 } }
        limit_500k:
          label: "☁️ DataCenter (Max 500k CPS)"
          overrides: { series: { type: "binary_search", min: 10, max: 500, precision: 10 } }
        limit_mellanox:
          label: "🚀 Mellanox Mode (Max 2M CPS)"
          overrides: { series: { type: "binary_search", min: 100, max: 2000, precision: 50 } }
    SYN5_UDP_PPS_STEP:
      type: "series"
      label: "UDP PPS Capacity Smart-Stepper Search [SYN5_UDP_PPS_STEP] (1M -> 14M PPS)"
      prompt: "[INFO]: Ищем аппаратный потолок PPS."
      repeats: 10         # Количество ступенек (например, 10 ступенек дойдут до 10M PPS)
      interval: 30        # Длительность одной ступеньки
      template:
        duration: 30
        actors:
          - tool: "trex"
            profile: "udp_flood_64b"
            overridemult: { start: 1000, step: 1000 }            
      presets:
        low_res:
          label: "🐢 Грубый поиск (Шаг 2M PPS)"
          overrides:
            actors:
              udp_flood_64b: { overridemult: { start: 1000, step: 2000 } }
        high_res:
          label: "🏃 Точный поиск (Шаг 500k PPS)"
          overrides:
            actors:
              udp_flood_64b: { overridemult: { start: 1000, step: 500 } }
    SYN6_MAX_CC:
      label: "Max Concurrent Connections Limit Search [SYN6_MAX_CC] (State Table Exhaustion)"
      prompt: "[INFO]: Ищем предел оперативной памяти (RAM) и таблицы трансляций NGFW."
      duration: 600
      health_check: true 
      actors:
        - <<: *TRex_ASTF
          profile: astf_max_cc  
          overridemult: 10 
      presets:
        target_1m: 
          label: "🎯 Target: 1M Sessions (2 мин)"
          overrides: { duration: 120 } 
        target_5m: 
          label: "🎯 Target: 5M Sessions (10 мин)"
          overrides: { duration: 600 } 
        target_10m: 
          label: "🎯 Target: 10M Sessions (20 мин)"
          overrides: { duration: 1200 }
  # =========================================================
  # ГРУППА 2: REAL-WORLD CAPACITY & DEGRADATION (PCAP)
  # RUN MODE: Binary Search -> Interactive Stepper
  # =========================================================
  group_2:
    label: "Effective Capacity & Feature Degradation (PCAP Mixes/Application traffic)"
    # --- ШАГ 2.1: ПОИСК ПОТОЛКА И ПОЛА (NDR) ---
    CAP1_NDR_NS:
      type: "series"
      label: "North-South NDR Binary Search [CAP1_NDR_NS] (Perimeter Mix)"
      prompt: "[INFO]: Поиск предела non-drop-rate на L7-миксе (Север-Юг)."
      health_check: true
      duration: 180       
      interval: 30        
      series:
        type: "binary_search"
        min: 1            
        max: 10           
        precision: 0.5    
        metric: "drops"   
        threshold: 0.1    
      template:
        actors:
          - <<: *TRex_ASTF
            profile: "astf_emix_perim" 
      presets:
        limit_10g:
          label: "🥉 Entry (Up to 10 Gbps)"
          overrides: { series: { min: 1, max: 20, precision: 1 } }
        limit_30g:
          label: "🥈 Mid-Range (Up to 30 Gbps)"
          overrides: { series: { min: 10, max: 60, precision: 2 } }
        limit_50g:
          label: "🥇 High-End (Up to 50+ Gbps)"
          overrides: { series: { min: 20, max: 120, precision: 5 } }
    CAP2_NDR_WE:
      type: "series"
      label: "West-East NDR Binary Search [CAP2_NDR_WE] (DataCenter Mix)"
      prompt: "[INFO]: Поиск предела non-drop-rate на TCP-потоках (Запад-Восток)."
      health_check: true
      duration: 180       
      interval: 30        
      series:
        type: "binary_search"
        min: 1            
        max: 10           
        precision: 0.5    
        metric: "drops"   
        threshold: 0.1    
      template:
        actors:
          - <<: *TRex_ASTF
            profile: "astf_emix_dc" 
      presets:
        limit_10g:
          label: "🥉 Entry (Up to 10 Gbps)"
          overrides: { series: { min: 1, max: 20, precision: 1 } }
        limit_30g:
          label: "🥈 Mid-Range (Up to 30 Gbps)"
          overrides: { series: { min: 10, max: 60, precision: 2 } }
        limit_50g:
          label: "🥇 High-End (Up to 50+ Gbps)"
          overrides: { series: { min: 20, max: 120, precision: 5 } }
    # --- ШАГ 2.2: ИНТЕРАКТИВНАЯ МАТРИЦА ---
    CAP3_PD1_NS:
      type: "series"
      label: "North-South Degradation Matrix [CAP3_PD1_NS] (Perimeter Mix)"
      prompt: "[INFO]: СЕРИЯ (5 шагов). Включайте функции NGFW накопительно в паузах между тестами (для тестов с включенным IPS установить чекбокс 'Malware Overlay'):\n1) IPS\n2) FW (L3+L4)\n3) FW (L3+L4) + DPI\n4) FW (L3+L4) + DPI + IPS\n5) FW (L3+L4) + DPI + IPS + GeoIP"
      repeats: 5
      interactive: true
      template:
        duration: 300
        actors:
          - <<: *TRex_ASTF
            profile: astf_emix_perim
      presets:
        low:
          label: "Low Load ~7 Gbps (Mult 5 x 1000 cps)"
          overrides:
            actors:
              astf_emix_perim: { overridemult: 5 }
        medium:
          label: "Medium Load ~20 Gbps (Mult 15 x 1000 cps)"
          overrides:
            actors:
              astf_emix_perim: { overridemult: 15 }
        high:
          label: "High Load ~40 Gbps (Mult 30 x 1000 cps)"
          overrides:
            actors:
              astf_emix_perim: { overridemult: 30 }
        extereme:
          label: "Extreme Load ~75 Gbps (Mult 60 x 1000 cps)"
          overrides:
            actors:
              astf_emix_perim: { overridemult: 60 }
    CAP4_PD2_WE:
      type: "series"
      label: "West-East Degradation Matrix [CAP4_PD2_WE] (DataCenter Mix)"
      prompt: "[INFO]: СЕРИЯ (5 шагов). Включайте функции NGFW накопительно в паузах между тестами (для тестов с включенным IPS установить чекбокс 'Malware Overlay'):\n1) IPS\n2) FW (L3+L4)\n3) FW (L3+L4) + DPI\n4) FW (L3+L4) + DPI + IPS\n5) FW (L3+L4) + DPI + IPS + GeoIP"
      repeats: 5
      interactive: true
      template:
        duration: 300
        actors:
          - <<: *TRex_ASTF
            profile: astf_emix_dc
      presets:
        low:
          label: "Low Load ~7 Gbps (Mult 5 x 1000 cps)"
          overrides:
            actors:
              astf_emix_dc: { overridemult: 5 }
        medium:
          label: "Medium Load ~20 Gbps (Mult 15 x 1000 cps)"
          overrides:
            actors:
              astf_emix_dc: { overridemult: 15 }
        high:
          label: "High Load ~40 Gbps (Mult 30 x 1000 cps)"
          overrides:
            actors:
              astf_emix_dc: { overridemult: 30 }
        extreme:
          label: "Extreme Load ~75 Gbps (Mult 60 x 1000 cps)"
          overrides:
            actors:
              astf_emix_dc: { overridemult: 60 }
  # =========================================================
  # ГРУППА 3: RESILIENCY & STRESS (ОТКАЗОУСТОЙЧИВОСТЬ И СТРЕСС-ТЕСТЫ)
  # RUN MODE: Single / Presets
  # =========================================================
  group_3:
    label: "Infrastructure Resiliency & Burst Stress Test"
    # --- Burst & Flood Tests ---
    RS1_SB:
      label: "Micro-Burst UDP Storm [RS1_SB] (Hardware Buffer & Interrupt Stress)"
      prompt: "[INFO]: JMeter создает L7-фон, TRex бьет UDP-микровсплесками. Всплески начнутся на 90-й секунде."
      duration: 180 
      actors:
        # --- Актор 1: Базовый L7 фон ---
        - <<: *JMeter_Base
          duration: 180 
          
        # --- Актор 2: Аппаратные L2/L4 всплески ---
        - tool: "trex"
          profile: "stl_udp_microburst" 
          delay: 90     
          duration: 60  
          overridemult: 12000000
      presets:
        light:
          label: "🌊 Moderate (Light Background + 10G Bursts)"
          overrides: 
            actors: 
              baseline: { threads: 50, override_tput: 500 }
              # 👇 ДОБАВИЛИ overridemult (скорость внутри всплеска: 10 млн PPS)
              stl_udp_microburst: 
                overridemult: 10000000
                tunables: { burst_size: 1000, gap_usec: 5000 }
        severe:
          label: "⚡ Severe (Heavy Background + 40G Bursts)"
          overrides: 
            actors: 
              baseline: { threads: 400, override_tput: 4000 }
              # 👇 ДОБАВИЛИ overridemult (скорость внутри всплеска: 14 млн PPS)
              stl_udp_microburst: 
                overridemult: 14000000
                tunables: { burst_size: 5000, gap_usec: 1000 }
    RS2_BB:
      label: "Macro-Burst UDP Storm [RS2_BB] (Queue & CPU Stress)"
      prompt: "[INFO]: JMeter держит стабильный L7-фон. TRex накатывает 3 жесткие UDP-волны (по 15 сек). Проверяем зависание CPU и дропы."
      duration: 300 
      actors:
        # --- Актор 1: Несгораемый L7-фон (JMeter) ---
        - <<: *JMeter_Base
          duration: 300           
        # --- Актор 2: Шторм 1 (Старт на 60 сек) ---
        - tool: "trex"
          profile: "stl_udp_macroburst" 
          delay: 60    
          duration: 15 
        # --- Актор 3: Шторм 2 (Старт на 105 сек) ---
        - tool: "trex"
          profile: "stl_udp_macroburst" 
          delay: 45    
          duration: 15 
        # --- Актор 4: Шторм 3 (Старт на 150 сек) ---
        - tool: "trex"
          profile: "stl_udp_macroburst" 
          delay: 45    
          duration: 15 
        # --- Актор 5: Шторм 4 (Старт на 195 сек) ---
        - tool: "trex"
          profile: "stl_udp_macroburst" 
          delay: 45    
          duration: 15 
        # --- Актор 6: Шторм 5 (Старт на 240 сек) ---
        - tool: "trex"
          profile: "stl_udp_macroburst" 
          delay: 45    
          duration: 15 
      presets:
        storm_medium:
          label: "🌊 Medium Storm (1M PPS Waves)"
          overrides: 
            actors: 
              baseline: { threads: 100, override_tput: 1000 }
              # Задаем скорость шторма прямо через tunables
              stl_udp_macroburst: { tunables: { pps_total: 1000000 } }
        storm_extreme:
          label: "🌊 Extreme Tsunami (5M PPS Waves)"
          overrides: 
            actors: 
              baseline: { threads: 400, override_tput: 4000 }
              stl_udp_macroburst: { tunables: { pps_total: 5000000 } }
    RS3_MW:
      label: "Macro-Burst TCP Storm [RS3_MW] (RAM & GC Stress)"
      prompt: "[INFO]: JMeter держит L7-фон. TRex накатывает 3 жесткие волны TCP-сессий (по 30 сек). Критерий: RAM не должна утекать после спада волн."
      duration: 270 # Общее время: 60с (разгон) + 3 волны по 30с с паузами + 30с (охлаждение)
      actors:
        # --- Актор 1: Несгораемый L7-фон (JMeter) ---
        - <<: *JMeter_Base
          duration: 270 
        # --- Актор 2: Волна 1 (Старт на 60 сек) ---
        - <<: *TRex_ASTF
          profile: astf_tcp_cps 
